<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şeir Ustası — Sözlərdən Şeirə</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="app">
  <header>
    <div class="brand-label">✦ Sözlər · Şeirlər · Hisslər ✦</div>
    <h1>Şeir Ustası</h1>
    <p class="subtitle">Sözlərini yaz — şeirinə çevrilsin</p>
  </header>

  <div class="main-card">

    <div class="section-label">Sözlər & Mövzu</div>
    <textarea
      class="words-input"
      id="wordsInput"
      placeholder="Nə haqqında şeir istəyirsən? Bir neçə söz, hiss, mövzu yaz...&#10;Məsələn: dəniz, köhnə sevgi, yağış, vətən həsrəti, uşaqlıq xatirələri"
      rows="4"
    ></textarea>

    <div class="options-row">
      <div>
        <div class="section-label" style="margin-bottom:10px; font-size:10px;">Üslub</div>
        <div class="chip-group" id="styleGroup">
          <div class="chip active" data-val="klassik lirik">Lirik</div>
          <div class="chip" data-val="fəlsəfi">Fəlsəfi</div>
          <div class="chip" data-val="romantik">Romantik</div>
          <div class="chip" data-val="kədərli eleji">Eleji</div>
          <div class="chip" data-val="qəzəl">Qəzəl</div>
          <div class="chip" data-val="müasir sərbəst">Sərbəst</div>
        </div>
      </div>
    </div>

    <div class="options-row" style="margin-top:16px;">
      <div>
        <div class="section-label" style="margin-bottom:10px; font-size:10px;">Uzunluq</div>
        <div class="chip-group" id="lengthGroup">
          <div class="chip active" data-val="qısa (2 bənd)">Qısa</div>
          <div class="chip" data-val="orta (4 bənd)">Orta</div>
          <div class="chip" data-val="uzun (6 bənd)">Uzun</div>
        </div>
      </div>
    </div>

    <button class="btn-generate" id="btnGenerate" onclick="generatePoem()">
      <span class="btn-inner">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L9.5 9.5H2l6 4.5L5.5 21 12 16.5 18.5 21 16 14l6-4.5h-7.5z"/></svg>
        Şeir Yarat
      </span>
    </button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="loading-state" id="loadingState">
      <div class="loader-ring"></div>
      <div class="loading-text">Sözlər şeirə çevrilir<span class="loading-dots"></span></div>
    </div>

    <div class="divider" id="divider" style="display:none"></div>

    <div class="result-section" id="resultSection">
      <div class="section-label">Şeiriniz</div>
      <div class="poem-card">
        <div class="poem-title" id="poemTitle"></div>
        <div class="poem-text" id="poemText"></div>
        <div class="poem-meta">
          <span class="poem-style-tag" id="poemStyleTag"></span>
          <button class="btn-copy" id="btnCopy" onclick="copyPoem()">Kopyala</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
